<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel EXP Roblox</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="glass-card">
        <h2>Admin Panel EXP</h2>
        
        <div class="input-group">
            <label>Admin:</label>
            <input type="text" id="adminName" placeholder="Nama Admin">
        </div>
        <div class="input-group">
            <label>Target Username & ID:</label>
            <input type="text" id="username" placeholder="Username">
            <input type="text" id="userId" placeholder="ID Roblox">
        </div>
        <div class="input-group">
            <label>Before (Contoh: Lv.4 EXP 5090):</label>
            <input type="text" id="beforeData" placeholder="Lv.4 EXP 5090">
        </div>
        <div class="input-group">
            <label>After (Contoh: Lv.6 EXP 90):</label>
            <input type="text" id="afterData" placeholder="Lv.6 EXP 90">
        </div>
        <div class="input-group">
            <label>Jumlah EXP ditambah:</label>
            <input type="number" id="expAmount" placeholder="12000">
        </div>

        <button onclick="addExp()" id="btn-submit">Kirim ke Discord</button>
        <p id="status-msg"></p>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
